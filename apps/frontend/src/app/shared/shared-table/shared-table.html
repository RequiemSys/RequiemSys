<div class="container">

  <div class="header">
    <h1>{{ title }}</h1>
    <p>{{ subtitle }}</p>
  </div>

  <div class="actions-container">
    <div class="search-container">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Buscar...">
    </div>
  </div>

  <div class="table-container">
    <table>

      <thead> <!-- Cabeçalho das colunas -->
        <tr>
          <!-- Percorre o array de colunas e exibe o texto definido em label -->
          <th *ngFor="let column of columns">{{ column.label }}</th>
          <th class="action-column">Ações</th>
        </tr>
      </thead>

      <tbody> <!-- Dados da tabela -->
        <!-- Percorre cada array presente no array de dados -->
        <tr *ngFor="let item of data">
          <!--
            Percorre novamente as colunas para acessar dinamicamente os
            valores correspondentes atraves da propriedade KEY
          -->
          <td *ngFor="let column of columns">{{ item[column.key] }}</td>
          <td class="action-column">
            <div class="action-buttons">
              <button
                *ngFor="let action of actions"
                mat-icon-button
                [matTooltip]="action.tooltip"
                (click)="handleAction(item, action.action)"
                class="action-button"
              >
                <mat-icon>{{ action.icon }}</mat-icon>
              </button>
            </div>
          </td>
        </tr>
      </tbody>

    </table>

    <!-- Mensagem quando não há dados -->
    <div *ngIf="!data || data.length === 0" class="empty-state">
      <mat-icon>inbox</mat-icon>
      <p>Nenhum registro encontrado</p>
    </div>
  </div>

</div>
