<div class="modal-container">
  <div class="header">
    <div class="icon-container">
      <mat-icon>description</mat-icon>
    </div>
    <h2>Informações de {{ data.nome }} </h2>
  </div>

    <div class="content">
      <p><strong>Nome Completo:</strong> {{ data.nome }}</p>
      <p><strong>Sexo:</strong> {{ data.sexo }}</p>
      <p><strong>Data de nascimento:</strong> {{ data.nascimento }}</p>
      <p><strong>E-mail:</strong> {{ data.email }}</p>
      <p><strong>CPF:</strong> {{ data.cpf }}</p>
      <p><strong>Telefone:</strong> {{ data.tel }}</p>
      <p><strong>Perfil de acesso:</strong> {{ data.access }}</p>
    </div>

    <div class="buttons">
      <button class="close-button" (click)="close()">Fechar</button>
    </div>

</div>
