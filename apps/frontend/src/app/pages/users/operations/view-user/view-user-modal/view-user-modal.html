<div class="modal-container">
  <div class="header">
    <div class="icon-container">
      <mat-icon>description</mat-icon>
    </div>
    <h2>Informações de {{ data.name }} </h2>
  </div>

    <div class="content">
      <p><strong>Nome Completo:</strong> {{ data.name }}</p>
      <p><strong>Sexo:</strong> {{ data.gender }}</p>
      <p><strong>Data de nascimento:</strong> {{ data.birth }}</p>
      <p><strong>E-mail:</strong> {{ data.email }}</p>
      <p><strong>Telefone:</strong> {{ data.phone }}</p>
    </div>

    <div class="buttons">
      <button class="close-button" (click)="close()">Fechar</button>
    </div>

</div>
