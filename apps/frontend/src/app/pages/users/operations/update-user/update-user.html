<div class="registro-container">

  <div class="back-button">
    <button type="button" (click)="back()">
      <mat-icon>arrow_back</mat-icon>
      Cancelar
    </button>
  </div>

  <div class="registro-card registro-card--wide">

    <div class="logo">
      <mat-icon>edit</mat-icon>
      <h1>RequiemSys</h1>
      <p>Preencha os campos abaixo para alterar as informações do usuário no sistema</p>
    </div>

    <form [formGroup]="form" class="registro-form">

      <div class="cadastro-grid">

        <div class="form-group">
          <label>Nome</label>
          <input type="text" formControlName="nome" class="form-control" />
        </div>

        <div class="form-group">
          <label>Sexo</label>
          <select formControlName="sexo" class="form-control">
            <option value="">Selecione</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
            <option value="O">Outro</option>
          </select>
        </div>

        <div class="form-group">
          <label>Data de Nascimento</label>
          <input
            type="date"
            formControlName="dataNascimento"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            formControlName="email"
            class="form-control"
          />
        </div>

        <div class="form-group grid-full">
          <label>Telefone</label>

          <div class="phone-row">

            <select formControlName="ddd" class="form-control ddd">
              <option value="">DDD</option>

              <option *ngFor="let d of ddds" [value]="d">
                {{ d }}
              </option>
            </select>

            <input
              type="text"
              formControlName="telefone"
              class="form-control phone-num"
            />

          </div>
        </div>

      </div>

      <div class="form-actions">

        <button
          type="button"
          class="btn-registro"
          (click)="onSubmit()"
        >
          Continuar
        </button>

      </div>

    </form>

  </div>

</div>
