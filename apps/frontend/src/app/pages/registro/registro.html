<div class="registro-container">
  <div class="registro-card registro-card--wide">
    <div class="logo">
      <h1>RequiemSys</h1>
      <p>Registro de Usuário</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="registro-form">
      <h2 class="section-title">Dados do Colaborador</h2>

      <div class="cadastro-grid">
        <div class="form-group">
          <label for="nome">Nome <span class="req">*</span></label>
          <input
            id="nome"
            type="text"
            formControlName="nome"
            class="form-control"
            placeholder="Nome completo"
          />
        </div>

        <div class="form-group">
          <label for="sexo">Sexo <span class="req">*</span></label>
          <select id="sexo" formControlName="sexo" class="form-control">
            <option value="" disabled selected hidden>Selecione</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
            <option value="O">Outro</option>
          </select>
        </div>

        <div class="form-group">
          <label for="dataNascimento">Data de Nascimento <span class="req">*</span></label>
          <input
            id="dataNascimento"
            type="date"
            formControlName="dataNascimento"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="email">Email <span class="req">*</span></label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            class="form-control"
            placeholder="Digite seu email"
          />
        </div>

        <div class="form-group">
          <label for="senha">Senha <span class="req">*</span></label>
          <input
            id="senha"
            type="password"
            formControlName="senha"
            autocomplete="new-password"
            class="form-control"
            placeholder="••••••"
          />
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar senha <span class="req">*</span></label>
          <input
            id="confirmarSenha"
            type="password"
            formControlName="confirmarSenha"
            autocomplete="new-password"
            class="form-control"
            placeholder="••••••"
          />
        </div>

        @if (
          form.hasError('passwordMismatch') &&
          (form.get('senha')?.touched || form.get('confirmarSenha')?.touched)
        ) {
          <p class="password-mismatch-msg grid-full" role="alert">
            As senhas precisam ser exatamente iguais.
          </p>
        }

        <div class="form-group grid-full">
          <label for="telefone">Telefone <span class="req">*</span></label>
          <div class="phone-row">
            <select
              id="ddd"
              formControlName="ddd"
              class="form-control ddd"
              aria-label="DDD"
            >
              <option value="" disabled selected hidden>DDD</option>
              @for (d of ddds; track d) {
                <option [value]="d">{{ d }}</option>
              }
            </select>
            <input
              id="telefone"
              type="tel"
              formControlName="telefone"
              class="form-control phone-num"
              placeholder="9 0000-0000"
            />
          </div>
        </div>
      </div>

      @if (submitError()) {
        <p class="form-error" role="alert">{{ submitError() }}</p>
      }

      <div class="form-actions">
        <button
          type="button"
          class="btn-secundario"
          (click)="voltar()"
          [disabled]="submitting()"
        >
          Voltar
        </button>
        <button type="submit" class="btn-registro" [disabled]="submitting()">
          {{ submitting() ? 'Enviando…' : 'Continuar' }}
        </button>
      </div>

      <p class="login-link">
        Já tem uma conta? <a routerLink="/login">Entrar</a>
      </p>
    </form>
  </div>
</div>
