<!-- src/app/pages/registro/login-dois.html -->
<div class="registro-container">
  <div class="registro-card">
    <div class="logo">
      <h1>⚰️ Cemitério Admin</h1>
      <p>Criação de Conta</p>
    </div>

    <form (ngSubmit)="criarConta()" class="registro-form">
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="Digite seu email"
          required
          class="form-control"
        >
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input 
          type="password" 
          [(ngModel)]="senha" 
          name="senha"
          placeholder="••••••"
          required
          class="form-control"
        >
      </div>

      <div class="form-group">
        <label>Confirmar Senha</label>
        <input 
          type="password" 
          [(ngModel)]="confirmarSenha" 
          name="confirmarSenha"
          placeholder="••••••"
          required
          class="form-control"
        >
      </div>

      <button type="submit" class="btn-registro">
        Criar Conta
      </button>

      <p class="login-link">
        Já tem uma conta? <a routerLink="">Entrar</a> -- precisa informar o link da rota ainda (n criei)
      </p>
    </form>
  </div>
</div>
